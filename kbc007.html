<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KBC001 管理者認証システム</title>

<style>
body{
margin:0;
min-height:100vh;
background:url("IMG_0599.jpeg") center center/cover no-repeat;
font-family:sans-serif;
text-align:center;
color:white;
}

.box{
padding-top:120px;
width:90%;
max-width:600px;
margin:auto;
}

h1{
font-size:70px;
color:#d40000;
text-shadow:0 0 20px red;
margin-bottom:0;
}

h2{
font-size:48px;
line-height:1.2;
color:#d40000;
text-shadow:0 0 15px red;
margin-top:10px;
}

p{font-size:22px;}

input{
width:80%;
padding:25px;
font-size:30px;
text-align:center;
border:3px solid red;
border-radius:20px;
background:black;
color:white;
box-shadow:0 0 20px red;
}

button{
margin-top:30px;
padding:20px 60px;
font-size:35px;
border-radius:20px;
background:black;
color:red;
border:3px solid red;
box-shadow:0 0 20px red;
}

#result{
margin-top:40px;
font-size:40px;
font-weight:bold;
background:rgba(0,0,0,0.65);
padding:20px;
border-radius:18px;
}

#fail{
margin-top:20px;
font-size:25px;
}

.warning{
margin-top:50px;
padding:20px;
border:1px solid red;
background:rgba(0,0,0,0.7);
color:red;
font-size:20px;
}
</style>
</head>

<body>

<div class="box">

<h1>KBC001</h1>

<h2>
管理者認証<br>
システム
</h2>

<p>管理者コードを入力せよ</p>

<input type="password" id="code">

<br>

<button onclick="checkCode()">認証</button>

<div id="result">認証待機中...</div>

<div id="fail">失敗回数：0 / 3</div>

<div class="warning">
【注意】<br>
認証に3回失敗すると、不正アクセス検知が発動します。
</div>

</div>

<script>
let failCount = 0;
let alarmLoop = null;

function machineBeep(freq=800, duration=120){
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const osc = audioCtx.createOscillator();
const gain = audioCtx.createGain();

osc.type = "square";
osc.frequency.value = freq;
gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration / 1000);

osc.connect(gain);
gain.connect(audioCtx.destination);

osc.start();
osc.stop(audioCtx.currentTime + duration / 1000);
}

function startAlarm(){
if(alarmLoop) return;

alarmLoop = setInterval(()=>{
machineBeep(500,200);

let alarm = new SpeechSynthesisUtterance("警告。不正アクセスを検知しました。");
alarm.lang="ja-JP";
alarm.rate=1.0;
alarm.pitch=0.7;

speechSynthesis.speak(alarm);
},4000);
}

function stopAlarm(){
if(alarmLoop){
clearInterval(alarmLoop);
alarmLoop = null;
}
speechSynthesis.cancel();
}

function say(text, delay){
setTimeout(()=>{
let msg = new SpeechSynthesisUtterance(text);
msg.lang="ja-JP";
msg.rate=0.9;
msg.pitch=0.7;
speechSynthesis.speak(msg);
},delay);
}

function checkCode(){

const code = document.getElementById("code").value;

if(code === "KBC001"){

stopAlarm();

document.getElementById("result").innerHTML =
"<span style='color:#00ff00'>管理者コード確認</span>";

setTimeout(()=>{
document.getElementById("result").innerHTML =
"<span style='color:#00ff00'>認証成功</span>";
},1000);

machineBeep(900,120);
setTimeout(()=>machineBeep(1200,100),180);
setTimeout(()=>machineBeep(700,180),380);

say("管理者コードを確認。", 800);
say("認証成功。", 3000);
say("ミスターKの命令を解除します。", 5500);
say("管理者変更します。", 9000);
say("管理者登録完了。", 12000);
say("新しい管理者は、福野さな、福野たいしん。", 15000);
say("ミスターK追跡モード発動。", 19500);
say("ミスターKを捕まえます。", 22500);
say("確保実行します。", 25500);

}else{

failCount++;

document.getElementById("result").innerHTML =
"<span style='color:red'>認証失敗</span>";

document.getElementById("fail").innerHTML =
"失敗回数：" + failCount + " / 3";

machineBeep(250,250);

if(failCount >= 3){
document.getElementById("result").innerHTML =
"<span style='color:red'>🚨 不正アクセス検知 🚨</span>";
startAlarm();
}

}

}
</script>

</body>
</html>
