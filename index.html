<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KBC001 管理者認証システム</title>

<style>
body{
margin:0;
min-height:100vh;
background:url("IMG_0599.jpeg") center center/cover no-repeat;
font-family:sans-serif;
text-align:center;
color:white;
}

.box{
padding-top:120px;
width:90%;
max-width:600px;
margin:auto;
}

h1{
font-size:70px;
color:#d40000;
text-shadow:0 0 20px red;
margin-bottom:0;
}

h2{
font-size:55px;
color:#d40000;
text-shadow:0 0 15px red;
margin-top:10px;
}

p{
font-size:22px;
}

input{
width:80%;
padding:25px;
font-size:30px;
text-align:center;
border:3px solid red;
border-radius:20px;
background:black;
color:white;
box-shadow:0 0 20px red;
}

button{
margin-top:30px;
padding:20px 60px;
font-size:35px;
border:none;
border-radius:20px;
background:black;
color:red;
border:3px solid red;
box-shadow:0 0 20px red;
}

#result{
margin-top:40px;
font-size:40px;
font-weight:bold;
}

#fail{
margin-top:20px;
font-size:25px;
}

.warning{
margin-top:50px;
padding:20px;
border:1px solid red;
background:rgba(0,0,0,0.7);
color:red;
font-size:20px;
}
</style>
</head>

<body>

<div class="box">

<h1>KBC001</h1>

<h2>管理者認証システム</h2>

<p>管理者コードを入力せよ</p>

<input type="password" id="code">

<br>

<button onclick="checkCode()">
認証
</button>

<div id="result">
認証待機中...
</div>

<div id="fail">
失敗回数：0 / 3
</div>

<div class="warning">
【注意】<br>
認証に3回失敗すると、不正アクセス検知が発動します。
</div>

</div>

<script>

let failCount = 0;

function checkCode(){

const code = document.getElementById("code").value;

if(code === "KBC001"){

document.getElementById("result").innerHTML=
"<span style='color:#00ff00'>管理者変更完了！</span>";

speechSynthesis.cancel();

let msg = new SpeechSynthesisUtterance(
"管理者が変更されました"
);

msg.lang="ja-JP";
msg.rate=0.9;

speechSynthesis.speak(msg);

}else{

failCount++;

document.getElementById("result").innerHTML=
"<span style='color:red'>認証失敗</span>";

document.getElementById("fail").innerHTML=
"失敗回数：" + failCount + " / 3";

if(failCount >= 3){

document.getElementById("result").innerHTML=
"<span style='color:red'>不正アクセス検知</span>";

speechSynthesis.cancel();

let alarm = new SpeechSynthesisUtterance(
"警告。不正アクセスを検知しました"
);

alarm.lang="ja-JP";

speechSynthesis.speak(alarm);

}

}

}

</script>

</body>
</html>
